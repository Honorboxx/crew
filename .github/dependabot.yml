# Keeps the pinned action SHAs in codeql.yml current. Same reasoning as the
# engine repo: the pins are correct and nothing was moving them.
#
# Only `github-actions`, and no `npm` entry, because there is no manifest here
# for it to read.
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:23"
      timezone: Etc/UTC
    commit-message:
      prefix: ci
    groups:
      # init and analyze are one tool in two steps, and CodeQL refuses a
      # mismatched pair. Dependabot counts them as two dependencies, so
      # ungrouped it bumps one half per PR and both halves fail. Every update
      # type, majors included: the halves cross a major together or not at all.
      codeql-action:
        patterns: ["github/codeql-action*"]
      actions:
        applies-to: version-updates
        update-types: [minor, patch]
